routing:
  lanes:
    L0_no_model:
      enabled: true
      description: deterministic operations only

    L1_low_cost:
      provider: google
      model: gemini_free_tier
      max_input_tokens: 6000
      max_output_tokens: 1200
      use_for:
        - summarize
        - rewrite
        - classify
        - extract

    L2_balanced:
      provider: google_or_openai_api
      model: balanced_paid_model
      max_input_tokens: 12000
      max_output_tokens: 2000
      use_for:
        - multi_step_planning
        - code_review
        - troubleshooting

    L3_heavy:
      provider: supervised_cli_session
      model: codex_or_gemini_advanced
      max_input_tokens: 24000
      max_output_tokens: 4000
      use_for:
        - architecture
        - difficult_reasoning
        - high_impact_outputs
      approval_required: true

  fallback_order:
    - L1_low_cost
    - L2_balanced
    - L3_heavy

controls:
  cache_enabled: true
  summarize_context_over_tokens: 8000
  one_retry_on_rate_limit: true
  block_auto_escalation_to_L3: true

budget_distribution_target:
  L1_low_cost_pct: 70
  L2_balanced_pct: 25
  L3_heavy_pct: 5

