routing:
  lanes:
    L0_no_model:
      enabled: true
      description: deterministic operations only
      use_for:
        - reminder_state_machine
        - cron_and_scheduling
        - workflow_routing
        - config_validation

    L1_low_cost:
      provider: google
      model: gemini-2.5-flash-lite
      provider_priority:
        - google_ai_studio_free
      provider_models:
        google_ai_studio_free: gemini-2.5-flash-lite
      max_input_tokens: 6000
      max_output_tokens: 1200
      use_for:
        - summarize
        - rewrite
        - classify
        - extract

    L1_openrouter_free_fallback:
      provider: openrouter
      model: openrouter/free
      provider_priority:
        - openrouter_free_overflow
      provider_models:
        openrouter_free_overflow: openrouter/free
      required_env:
        - OPENROUTER_API_KEY
      max_input_tokens: 6000
      max_output_tokens: 1200
      use_for:
        - summarize
        - rewrite
        - classify
        - extract

    L2_balanced:
      provider: multi_provider
      model: gpt-5-mini
      provider_priority:
        - openai_subscription_session
        - google_ai_studio_free
        - openrouter_free_overflow
        - anthropic_credit_pool
      provider_models:
        openai_subscription_session: gpt-5-mini
        google_ai_studio_free: gemini-2.5-flash
        openrouter_free_overflow: openrouter/free
        anthropic_credit_pool: claude-sonnet-4-20250514
      max_input_tokens: 12000
      max_output_tokens: 2000
      use_for:
        - multi_step_planning
        - code_review
        - troubleshooting

    L3_heavy:
      provider: approval_gated_heavy
      model: gpt-5.4
      provider_priority:
        - openai_subscription_session
        - anthropic_credit_pool
        - google_ai_studio_free
      provider_models:
        openai_subscription_session: gpt-5.4
        anthropic_credit_pool: claude-sonnet-4-20250514
        google_ai_studio_free: gemini-2.5-pro
      manual_tool_fallbacks:
        - codex_cli
        - gemini_cli
      max_input_tokens: 32000
      max_output_tokens: 6000
      use_for:
        - architecture
        - difficult_reasoning
        - high_impact_outputs
      approval_required: true

  fallback_order:
    - L1_low_cost
    - L1_openrouter_free_fallback
    - L2_balanced
    - L3_heavy

  usage_modes:
    strict_cost:
      description: Keep daily throughput on free lanes and block auto-heavy escalation.
      default_lane: L1_low_cost
      allow_auto_escalation_up_to: L2_balanced
      reserve_l3_for:
        - architecture_decisions
        - high_risk_code_changes
    balanced_default:
      description: Default mode with moderate escalation for quality-sensitive outputs.
      default_lane: L1_low_cost
      allow_auto_escalation_up_to: L2_balanced
      reserve_l3_for:
        - architecture_decisions
    quality_push:
      description: Prioritize output quality, still requiring approval for heavy runs.
      default_lane: L2_balanced
      allow_auto_escalation_up_to: L3_heavy
      reserve_l3_for:
        - architecture_decisions
        - ambiguous_high_stakes_planning
        - critical_debugging

  decision_matrix:
    deterministic_workflow:
      intent_tags:
        - cron
        - reminder_scheduler
        - parsing
        - state_machine
      preferred_lane: L0_no_model
      provider_preference: []
      fallback_lanes: []
      approval_required: false
    quick_read_write:
      intent_tags:
        - short_summary
        - rewrite
        - classify
        - extraction
      preferred_lane: L1_low_cost
      provider_preference:
        - google_ai_studio_free
      fallback_lanes:
        - L1_openrouter_free_fallback
        - L2_balanced
      approval_required: false
    inbox_triage_and_digest:
      intent_tags:
        - inbox_triage
        - digest
        - todo_planning
      preferred_lane: L1_low_cost
      provider_preference:
        - google_ai_studio_free
      fallback_lanes:
        - L1_openrouter_free_fallback
        - L2_balanced
      approval_required: false
    research_synthesis:
      intent_tags:
        - multi_source_summary
        - compare_options
        - recommendation_draft
      preferred_lane: L2_balanced
      provider_preference:
        - openai_subscription_session
        - google_ai_studio_free
        - anthropic_credit_pool
        - openrouter_free_overflow
      fallback_lanes:
        - L1_low_cost
        - L3_heavy
      approval_required: false
    coding_and_integration:
      intent_tags:
        - code_generation
        - debugging
        - integration_fix
      preferred_lane: L2_balanced
      provider_preference:
        - openai_subscription_session
        - google_ai_studio_free
        - openrouter_free_overflow
        - anthropic_credit_pool
      fallback_lanes:
        - L1_low_cost
        - L3_heavy
      approval_required: false
    architecture_or_high_ambiguity:
      intent_tags:
        - architecture
        - roadmap_design
        - major_tradeoff
      preferred_lane: L3_heavy
      provider_preference:
        - openai_subscription_session
        - anthropic_credit_pool
        - google_ai_studio_free
      fallback_lanes:
        - L2_balanced
      approval_required: true
    external_write_action:
      intent_tags:
        - send_email
        - post_message
        - trigger_workflow
      preferred_lane: L1_low_cost
      provider_preference:
        - google_ai_studio_free
      fallback_lanes:
        - L1_openrouter_free_fallback
        - L2_balanced
      approval_required: true
    credit_preservation_mode:
      intent_tags:
        - quota_spike
        - temporary_rate_limit
      preferred_lane: L1_openrouter_free_fallback
      provider_preference:
        - openrouter_free_overflow
      fallback_lanes:
        - L1_low_cost
        - L2_balanced
      approval_required: false

provider_inventory:
  google_ai_studio_free:
    required_env:
      - GEMINI_API_KEY
    transport: google_generative_language
    budget_type: free_quota
    default_model: gemini-2.5-flash-lite
    healthcheck_model: gemini-2.5-flash-lite
    supported_models:
      - gemini-2.5-flash-lite
      - gemini-2.5-flash
      - gemini-2.5-pro
    strengths:
      - low_cost_high_volume
      - fast_small_to_medium_tasks
    weaknesses:
      - burst_rate_limits
      - variable_availability_under_load
  openrouter_free_overflow:
    required_env:
      - OPENROUTER_API_KEY
    transport: openrouter_chat_completions
    optional_env:
      - OPENROUTER_FREE_MODEL
    budget_type: free_overflow
    default_model: openrouter/free
    model_env_override: OPENROUTER_FREE_MODEL
    healthcheck_model: openrouter/free
    strengths:
      - provider_diversification
      - low_cost_overflow
    weaknesses:
      - model_and_quota_variability
      - no_unlimited_guarantee
  codex_subscription_cli:
    required_command: codex
    budget_type: supervised_local_tool
    default_model: codex-cli-managed
    strengths:
      - high_quality_repo_local_coding_and_planning
      - strong_when_filesystem_context_matters
    weaknesses:
      - not_safe_as_background_automation_provider
      - session_and_auth_state_can_be_operator_dependent
  openai_subscription_session:
    required_command: codex
    transport: codex_exec_session
    budget_type: interactive_subscription_session
    default_model: gpt-5-mini
    healthcheck_model: gpt-5-mini
    supported_models:
      - gpt-5-mini
      - gpt-5.1
      - gpt-5.4
      - gpt-5.1-codex-mini
    usage_policy: interactive_only_for_hard_work_or_bigger_limits
    strengths:
      - premium_interactive_reasoning
      - larger_limits_than_free_lanes
      - aligned_with_existing_openai_subscription_access
    weaknesses:
      - not_safe_as_background_automation_provider
      - auth_state_depends_on_operator_session
  gemini_cli_local:
    required_command: gemini
    budget_type: supervised_local_tool
    default_model: gemini-cli-managed
    strengths:
      - useful_for_supervised_local_google_workflows
      - strong_manual_file_aware_iteration
    weaknesses:
      - not_safe_as_background_automation_provider
      - session_and_auth_state_can_be_operator_dependent
  anthropic_credit_pool:
    required_env:
      - ANTHROPIC_API_KEY
    transport: anthropic_messages
    budget_type: prepaid_credits
    default_model: claude-sonnet-4-20250514
    healthcheck_model: claude-sonnet-4-20250514
    supported_models:
      - claude-sonnet-4-20250514
    usage_policy: reserve_for_complex_design_or_second_opinion
    default_daily_call_cap: 3
    strengths:
      - structured_long_form_reasoning
    weaknesses:
      - limited_credit_pool

fallback_policies:
  on_rate_limit:
    steps:
      - reduce_context_and_retry_once
      - switch_to_next_lane_in_order
  on_quota_exhaustion:
    low_risk_tasks:
      - switch_to_openrouter_free_overflow
      - queue_until_quota_reset_if_no_free_lane_available
    high_impact_tasks:
      - require_manual_approval_for_l3
      - pause_if_no_approved_provider_available
  on_provider_outage:
    steps:
      - mark_provider_unhealthy_for_15_minutes
      - skip_unhealthy_provider_in_priority_lists

controls:
  cache_enabled: true
  summarize_context_over_tokens: 8000
  one_retry_on_rate_limit: true
  block_auto_escalation_to_L3: true
  max_auto_fallback_hops: 2
  require_manual_approval_for_anthropic: true

budget_distribution_target:
  L1_low_cost_pct: 70
  L2_balanced_pct: 25
  L3_heavy_pct: 5
