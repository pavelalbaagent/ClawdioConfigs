knowledge_sources:
  active_profile: default
  profiles:
    default:
      enabled_sources:
        - ai_tools_db
        - fitness_grounding
        - governance_memory

  sources:
    ai_tools_db:
      enabled: true
      kind: local_markdown_corpus
      root_candidates:
        - /opt/clawdio/external/AIToolsDB/corpus/ai_tools
        - /opt/aitoolsdb/corpus/ai_tools
        - /Users/palba/Projects/AIToolsDB/corpus/ai_tools
      allowed_agents:
        - assistant
        - researcher
        - builder
      allowed_spaces:
        - general
        - research
        - job-search
        - coding
      top_k: 4
      excerpt_chars: 280
      max_files_scan: 600
      auto_query:
        always_for_agents:
          - researcher
        keyword_hints:
          - ai
          - llm
          - model
          - models
          - tool
          - tools
          - agent
          - agents
          - automation
          - workflow
          - codex
          - gemini
          - openai
          - anthropic
          - claude
          - openrouter
          - mcp
          - n8n
      digest:
        enabled: true
        chat_id_env: TELEGRAM_RESEARCH_CHAT_ID
        max_items: 8
        lookback_hours: 36

    fitness_grounding:
      enabled: true
      kind: local_markdown_corpus
      root_candidates:
        - /opt/clawdio/external/fitness_grounding
        - ../fitness/knowledge
      allowed_agents:
        - fitness_coach
      allowed_spaces:
        - fitness
      top_k: 3
      excerpt_chars: 280
      max_files_scan: 200
      auto_query:
        keyword_hints:
          - hypertrophy
          - plateau
          - stalled
          - deload
          - recovery
          - sore
          - soreness
          - fatigue
          - volume
          - progression
          - elbow
          - pain
          - irritated
          - swap
          - replace
          - substitute
          - myorep
          - superset
          - warmup

    governance_memory:
      enabled: true
      kind: local_markdown_corpus
      root_candidates:
        - ../memory
      allowed_agents:
        - assistant
        - researcher
        - builder
        - fitness_coach
        - ops_guard
      allowed_spaces:
        - general
        - research
        - job-search
        - coding
        - fitness
        - ops
      top_k: 3
      excerpt_chars: 260
      max_files_scan: 40
      auto_query:
        keyword_hints:
          - directive
          - directives
          - finding
          - findings
          - governance
          - review
          - cleanup
          - policy
          - lesson
          - lessons
