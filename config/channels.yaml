channels:
  primary_human_channel: telegram
  secondary_human_channel: web_dashboard
  enabled:
    - telegram
    - web_dashboard
    - gmail_inbox
  disabled:
    - whatsapp
  adapter_modes:
    telegram: long_polling
    web_dashboard: local_http
    gmail_inbox: scheduled_batch_pull
  deferred_candidates:
    - slack

notifications:
  reminders:
    enabled: true
    channel: telegram
    daily_digest_time: "20:30"
  incidents:
    enabled: true
    channel: telegram

commands:
  status: status
  budget: budget
  add_task: add-task
  run_agent_task: run-agent-task
  approve: approve
