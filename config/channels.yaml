channels:
  primary_human_channel: telegram
  secondary_human_channel: web_dashboard
  enabled:
    - telegram
    - web_dashboard
    - gmail_inbox
  disabled:
    - whatsapp
  adapter_modes:
    telegram: long_polling
    web_dashboard: local_http
    gmail_inbox: scheduled_batch_pull
  telegram:
    adapter_mode: long_polling
    default_binding: assistant_main
    reminder_binding: assistant_main
    assistant_morning_briefing:
      enabled: true
      binding_id: assistant_main
      delivery_time_local: "07:00"
      timezone: America/Guayaquil
      max_schedule_suggestions: 3
    allow_unbound_chats: false
    chat_bindings:
      assistant_main:
        label: Assistant Main
        chat_id_env: TELEGRAM_ALLOWED_CHAT_ID
        default_agent: assistant
        default_space: general
        natural_language_services:
          reminders: true
          tasks: true
          calendar: true
          braindump: true
          fitness: true
          cross_agent_routing: true
      researcher_lab:
        label: Researcher Lab
        chat_id_env: TELEGRAM_RESEARCH_CHAT_ID
        default_agent: researcher
        default_space: research
        natural_language_services:
          reminders: false
          tasks: false
          calendar: false
          braindump: true
          fitness: false
          cross_agent_routing: false
      builder_workbench:
        label: Builder Workbench
        chat_id_env: TELEGRAM_BUILDER_CHAT_ID
        default_agent: builder
        default_space: coding
        natural_language_services:
          reminders: false
          tasks: false
          calendar: false
          braindump: false
          fitness: false
          cross_agent_routing: false
      fitness_coach:
        label: Fitness Coach
        chat_id_env: TELEGRAM_FITNESS_CHAT_ID
        default_agent: fitness_coach
        default_space: fitness
        natural_language_services:
          reminders: false
          tasks: false
          calendar: false
          braindump: false
          fitness: true
          cross_agent_routing: false
      ops_guard:
        label: Ops Guard
        chat_id_env: TELEGRAM_OPS_CHAT_ID
        default_agent: ops_guard
        default_space: ops
        natural_language_services:
          reminders: false
          tasks: false
          calendar: false
          braindump: false
          fitness: false
          cross_agent_routing: false
  deferred_candidates:
    - slack

notifications:
  reminders:
    enabled: true
    channel: telegram
    daily_digest_time: "20:30"
  incidents:
    enabled: true
    channel: telegram

commands:
  status: status
  budget: budget
  add_task: add-task
  run_agent_task: run-agent-task
  approve: approve
