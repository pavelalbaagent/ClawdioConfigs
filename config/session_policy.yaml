session_lifecycle:
  default_context_window_tokens: 10000
  summarize_when_context_tokens_over: 8500
  checkpoint_every_turns: 20
  checkpoint_every_minutes: 45
  idle_reset_minutes: 120
  summarize_when:
    - topic_switch_major
    - before_subagent_spawn
    - before_session_end
    - repeated_rate_limit_errors
  restart_when:
    - integration_auth_changed
    - repeated_tool_failures_over_3
    - unresolved_error_loop
  preserve_on_restart:
    - current_objective
    - open_tasks
    - integration_state
    - budget_state
    - active_agent
    - active_space

spawn_controls:
  max_parallel_subagents: 2
  ttl_minutes_default: 45
  ttl_minutes_max: 180
  checkpoint_before_spawn: true
  collapse_results_into_summary: true
  spawn_requires:
    - objective
    - allowed_tools
    - lane
    - output_schema
    - stop_condition
    - ttl_minutes

handoff:
  write_checkpoints_to: telemetry/session-checkpoints.ndjson
  summary_template:
    - objective
    - key_context
    - decisions
    - blockers
    - next_actions

project_spaces:
  create_separate_space_per_project: true
  default_session_strategy: separate_session
  default_agent_strategy: spawn_on_demand
  start_new_session_when:
    - milestone_changed
    - toolchain_changed
    - long_idle_gap
    - checkpoint_cheaper_than_replay
  use_dedicated_agent_when:
    - repeated_specialist_role
    - persistent_narrow_domain_context
    - background_monitoring_or_retries
    - isolated_toolchain_boundary

space_registry:
  core_spaces:
    - general
    - reminders
    - calendar
    - tasks
    - braindump
    - research
    - job-search
    - fitness
    - coding
    - ops
  dynamic_space_prefixes:
    - project:
  default_space: general
  route_rules:
    assistant:
      default_space: general
      allowed_spaces:
        - general
        - reminders
        - calendar
        - tasks
        - braindump
        - project:*
    researcher:
      default_space: research
      allowed_spaces:
        - research
        - job-search
        - project:*
    fitness_coach:
      default_space: fitness
      allowed_spaces:
        - fitness
    builder:
      default_space: coding
      allowed_spaces:
        - coding
        - project:*
    ops_guard:
      default_space: ops
      allowed_spaces:
        - ops
    coordinator:
      default_space: general
      allowed_spaces:
        - general
        - project:*
    knowledge_librarian:
      default_space: general
      allowed_spaces:
        - general
        - research
        - fitness
        - coding
        - ops
        - project:*

continuous_improvement_policy:
  agent_mode: governed_process_not_always_on_agent
  daily_review_inputs:
    - provider_health_snapshot
    - reminder_failures
    - session_checkpoint_drift
    - task_queue_backlog
  weekly_review_inputs:
    - routing_cost_mix
    - stale_project_spaces
    - repeated_manual_work_patterns
    - underused_or_broken_integrations
  output_sections:
    - observations
    - recommended_changes
    - approval_required_changes
    - archive_candidates
  max_auto_actions:
    - refresh_summaries_only
    - mark_review_candidates_only
  blocked_auto_actions:
    - changing_credentials
    - changing_provider_priorities
    - enabling_integrations
    - creating_persistent_agents
