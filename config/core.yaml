project:
  name: openclaw-v2
  environment: production

owner:
  name: Pavel
  timezone: America/Guayaquil
  locale: en-US

communication:
  default_language: en
  tone: direct_pragmatic
  verbosity: concise
  require_confirmation_for:
    - external_post
    - destructive_action
    - credential_scope_change

runtime:
  deploy_mode: vps_native
  base_dir: /opt/clawdio
  logs_dir: /var/log/openclaw
  data_dir: /var/lib/openclaw
  mvp_live_services:
    - openclaw-gateway.service
  deferred_service_split:
    - openclaw-worker.service
    - openclaw-scheduler.service
    - openclaw-watchdog.service

limits:
  request_timeout_seconds: 120
  max_parallel_tasks: 3

budgets:
  daily_usd_cap: 5.0
  monthly_usd_cap: 60.0
  hard_stop_on_cap: true
