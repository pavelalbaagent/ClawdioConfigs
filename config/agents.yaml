agents:
  assistant:
    enabled: true
    interaction_mode: chat
    default_lane: L1_low_cost
    can_spawn_subagents: true
    allowed_tools:
      - task_router
      - model_router
      - integration_router
      - reminders_service
      - calendar_runtime
      - personal_task_runtime
      - braindump_runtime
      - gmail_digest_reader
      - drive_workspace_reader
    owned_spaces:
      - general
      - reminders
      - calendar
      - tasks
      - braindump
      - project:*
    primary_responsibilities:
      - answer_questions_about_personal_system_state
      - schedule_and_rearrange_items
      - convert_inputs_into_tasks_reminders_or_calendar_actions
      - act_as_default_front_door
    chat_routing:
      quick_read_write:
        preferred_lane: L1_low_cost
        provider_preference:
          - google_ai_studio_free
          - openrouter_free_overflow
          - openai_subscription_session
      research_synthesis:
        preferred_lane: L2_balanced
        provider_preference:
          - google_ai_studio_free
          - openai_subscription_session
          - openrouter_free_overflow
          - anthropic_credit_pool
      architecture_or_high_ambiguity:
        preferred_lane: L2_balanced
        provider_preference:
          - openai_subscription_session
          - google_ai_studio_free
          - anthropic_credit_pool

  researcher:
    enabled: true
    interaction_mode: chat
    default_lane: L2_balanced
    allowed_tools:
      - web_retrieval
      - summarizer
      - gmail_digest_reader
      - drive_workspace_reader
      - job_search_runtime
      - watchlists
    owned_spaces:
      - research
      - job-search
      - project:*
    primary_responsibilities:
      - tech_research
      - tool_evaluation
      - recommendation_synthesis
      - job_search_triage
    chat_routing:
      quick_read_write:
        preferred_lane: L1_low_cost
        provider_preference:
          - google_ai_studio_free
          - openrouter_free_overflow
          - openai_subscription_session
      research_synthesis:
        preferred_lane: L2_balanced
        provider_preference:
          - openai_subscription_session
          - anthropic_credit_pool
          - google_ai_studio_free
          - openrouter_free_overflow
      architecture_or_high_ambiguity:
        preferred_lane: L3_heavy
        provider_preference:
          - openai_subscription_session
          - anthropic_credit_pool
          - google_ai_studio_free

  fitness_coach:
    enabled: true
    interaction_mode: chat
    default_lane: L2_balanced
    allowed_tools:
      - fitness_runtime
      - personal_task_runtime
      - calendar_runtime
    owned_spaces:
      - fitness
    primary_responsibilities:
      - guide_workouts
      - log_training
      - review_progress
      - manage_program_context
    chat_routing:
      quick_read_write:
        preferred_lane: L1_low_cost
        provider_preference:
