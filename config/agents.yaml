          - anthropic_credit_pool
          - openrouter_free_overflow
      architecture_or_high_ambiguity:
        preferred_lane: L2_balanced
        provider_preference:
          - openai_subscription_session
          - anthropic_credit_pool
          - google_ai_studio_free

  builder:
    enabled: true
    interaction_mode: chat
    default_lane: L2_balanced
    allowed_tools:
      - codex_cli
      - gemini_cli
      - file_ops
      - github_runtime
      - repo_workspace
      - test_runner
    owned_spaces:
      - coding
      - project:*
    primary_responsibilities:
      - implement_features
      - debug_and_refactor
      - operate_on_assigned_repos
    chat_routing:
      quick_read_write:
        preferred_lane: L1_low_cost
        provider_preference:
          - google_ai_studio_free
