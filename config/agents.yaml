  ops_guard:
    enabled: true
    interaction_mode: governed_process
    default_lane: L1_low_cost
    allowed_tools:
      - service_health
      - alerting
      - logs_reader
      - provider_health
      - telemetry_reports
    owned_spaces:
      - ops
    primary_responsibilities:
      - monitor_service_health
      - summarize_failures
      - detect_quota_or_runtime_regressions
    chat_routing:
      quick_read_write:
        preferred_lane: L1_low_cost
        provider_preference:
          - google_ai_studio_free
          - openrouter_free_overflow
          - anthropic_credit_pool
      research_synthesis:
        preferred_lane: L2_balanced
        provider_preference:
          - google_ai_studio_free
          - anthropic_credit_pool
          - openrouter_free_overflow

internal_roles:
  coordinator:
    enabled: true
    visibility: internal_only
    interaction_mode: internal
    default_lane: L1_low_cost
    allowed_tools:
      - task_router
      - model_router
      - integration_router
      - agent_router
    responsibilities:
      - classify_user_requests
      - select_space_and_specialist
      - keep_default_agent_surface_simple
  knowledge_librarian:
    enabled: true
    visibility: internal_only
    interaction_mode: internal
    default_lane: L1_low_cost
    allowed_tools:
      - memory_index
      - drive_workspace_reader
      - summary_writer
    responsibilities:
      - compress_context
      - maintain_space_summaries
      - propose_memory_promotions

surfaces:
  default_user_facing_agent: assistant
  visible_agents:
    - assistant
    - researcher
    - fitness_coach
    - builder
    - ops_guard
  hidden_internal_roles:
    - coordinator
    - knowledge_librarian

routing_overrides:
  active_mode: balanced_default
  agent_task_matrix:
    assistant:
      quick_triage: L1_low_cost
      routine_planning: L1_low_cost
      ambiguous_planning: L2_balanced
      architecture_decision: L3_heavy
      schedule_rearrangement: L1_low_cost
      cross_app_question_answering: L2_balanced
    researcher:
      source_collection: L1_low_cost
      synthesis: L2_balanced
      high_impact_recommendation: L3_heavy
      job_search_recommendation: L2_balanced
    fitness_coach:
      workout_guidance: L1_low_cost
      progress_review: L2_balanced
      program_redesign: L2_balanced
    builder:
      quick_patch: L1_low_cost
      standard_feature_build: L2_balanced
      major_refactor: L3_heavy
    ops_guard:
      health_checks: L0_no_model
      incident_summary: L1_low_cost
      root_cause_analysis: L2_balanced
      improvement_audit: L2_balanced
    coordinator:
      route_and_assign: L0_no_model
      ambiguous_reroute: L1_low_cost
      multi_agent_breakdown: L2_balanced
    knowledge_librarian:
      context_compaction: L0_no_model
      summary_refresh: L1_low_cost
      memory_promotion_review: L2_balanced
  fallback_paths:
    low_cost_blocked:
      - L1_openrouter_free_fallback
      - L2_balanced
    balanced_blocked:
      - L1_low_cost
      - L3_heavy
    heavy_blocked:
      - L2_balanced
      - manual_pause_and_review
  escalation_rules:
    - condition: two_failures_same_task_in_30m
      action: escalate_one_lane_then_pause
    - condition: task_has_external_write_intent
      action: require_human_approval
    - condition: task_is_high_stakes_or_irreversible
      action: require_human_approval

spawn_policy:
  max_active_subagents: 2
  default_ttl_minutes: 45
  spawn_when:
    - task_estimate_over_30_minutes
    - specialized_tooling_required
    - isolation_required
  never_spawn_when:
    - quick_edit
    - single_prompt_summary
    - simple_status_query

approval_required:
  - L3_heavy
  - external_account_action
  - data_deletion

continuous_improvement:
  enabled: true
  mode: bounded_review_loop
  owner_role: ops_guard
  reviewer_roles:
    - ops_guard
    - coordinator
    - knowledge_librarian
  cadence:
    daily_ops_review: true
    weekly_architecture_review: true
  sources:
    - telemetry/model-calls.ndjson
    - telemetry/session-checkpoints.ndjson
    - data/provider-smoke-status.json
    - data/memory-sync-status.json
    - data/dashboard-workspace.json
    - data/job-search-daily-summary.json
  outputs:
    review_dir: docs/reviews
    latest_status_file: data/continuous-improvement-status.json
  bounded_rules:
    - do_not_auto_change_credentials
    - do_not_auto_change_provider_order_without_approval
    - do_not_auto_enable_new_integrations
    - do_not_auto_spawn_new_persistent_agents
    - all_structural_changes_require_human_approval
  review_focus:
    - failing_or_noisy_routes
    - context_bloat_hotspots
    - stale_project_spaces
    - overused_heavy_lane_calls
    - repeated_manual_work_worth_productizing
