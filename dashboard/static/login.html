<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenClaw Dashboard Login</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <h1>Dashboard Login</h1>
        <p>Enter your dashboard token to access the control plane.</p>
      </section>

      <section class="card login-card">
        <div class="controls">
          <div class="control-row">
            <label for="token-input">Token</label>
            <input id="token-input" type="password" placeholder="OPENCLAW_DASHBOARD_TOKEN value" />
          </div>
          <div class="control-row">
            <button id="login-button">Login</button>
          </div>
          <p class="footnote" id="auth-hint"></p>
          <div id="error-banner" class="banner"></div>
        </div>
      </section>
    </main>

    <script src="/login.js"></script>
  </body>
</html>
